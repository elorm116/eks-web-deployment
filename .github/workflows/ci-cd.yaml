name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: web-app
  ECR_REGISTRY: 393818036545.dkr.ecr.us-east-1.amazonaws.com

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Keep in-progress deploys on main alive; cancel freely on PRs
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: write
  id-token: write
  security-events: write

jobs:
  # ── 1. Security Gate ─────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan — Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Scan for secrets only
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret          # scope to secrets — avoids noisy dep/vuln hits
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

  # ── 2. Build ─────────────────────────────────────────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build locally (amd64 only) and export as tar for the scan job
      - name: Build image locally for scanning
        uses: docker/build-push-action@v7
        with:
          context: app/
          platforms: linux/amd64
          tags: web-app:${{ github.sha }}
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load image for smoke-check
        run: docker load -i /tmp/image.tar

      - name: Upload image artifact for scan job
        uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/image.tar

      # ── ECR push (main branch only) ──────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}   # OIDC — no static keys
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: github.ref == 'refs/heads/main'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # provenance: false — required for multi-arch manifests on ECR;
      # ECR does not support OCI image index with provenance attestation.
      - name: Build and push to ECR — SHA tag only
        if: github.ref == 'refs/heads/main'
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: app/
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Debug digest from build action
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Digest received: ${{ steps.build-push.outputs.digest }}"

  # ── 3. Container Scan ────────────────────────────────────────────────────
  container-scan:
    name: Container Scan — Trivy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Trivy scan — SARIF upload
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: web-app:${{ github.sha }}
          scanners: vuln            
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Trivy scan — hard fail on unfixed criticals
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: web-app:${{ github.sha }}
          scanners: vuln
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── 4. IaC Scan ──────────────────────────────────────────────────────────
  iac-scan:
    name: IaC Scan — Checkov
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-results.sarif

  # ── 5. Sign image ────────────────────────────────────────────────────────
  sign:
    name: Sign Image — Cosign
    runs-on: ubuntu-latest
    needs: [container-scan, iac-scan, build]
    if: github.ref == 'refs/heads/main' && needs.build.outputs.digest != ''
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4

      - name: Sign image by digest
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          DIGEST: ${{ needs.build.outputs.digest }}
          IMAGE_REF: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
        run: |
          if [[ -z "$DIGEST" ]]; then
            echo "❌ No digest received from build job"
            echo "Digest value: '${DIGEST}'"
            exit 1
          fi

          echo "Signing: $IMAGE_REF@$DIGEST"

          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          chmod 600 cosign.key

          cosign sign --key cosign.key "$IMAGE_REF@$DIGEST"

          rm -f cosign.key
          echo "✅ Image signed successfully with digest $DIGEST"

  # ── 6. Deploy ────────────────────────────────────────────────────────────
  deploy:
    name: Update GitOps Manifest
    runs-on: ubuntu-latest
    needs: [sign, build]
    if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Update image in deployment.yaml
        env:
          IMAGE_REF: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          DIGEST: ${{ needs.build.outputs.digest }}
        run: |
          git pull --rebase origin main

          sed -i "s|image:.*web-app.*|image: $IMAGE_REF@$DIGEST|g" \
            k8s/base/deployment.yaml

          grep "image:" k8s/base/deployment.yaml

          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add k8s/base/deployment.yaml

          # Nothing to commit means image ref unchanged — not an error
          git diff --cached --quiet && echo "No manifest changes, skipping commit" && exit 0

          git commit -m "ci: deploy sha-${{ github.sha }} [skip ci]"

          # Retry push up to 3 times in case of a concurrent commit race
          for i in 1 2 3; do
            git push origin main && exit 0
            echo "Push failed (attempt $i/3), rebasing..."
            git pull --rebase origin main
          done

          echo "❌ Failed to push after 3 attempts"
          exit 1