name: CI/CD Pipeline - EKS Deployment

on:
  workflow_dispatch:   
  push:
    branches: [main]
    paths:
      - 'app/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: web-app
  IMAGE_NAME: web-app

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel in-progress runs on PRs freely; protect main deploys from cancellation
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: write
  id-token: write
  security-events: write

jobs:
  # ── 1. Security Gate ─────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan — Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Scan for secrets
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret          
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

  # ── 2. Build & Push ──────────────────────────────────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    outputs:
      digest: ${{ steps.build-ecr.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4


      - name: Build and export image locally
        uses: docker/build-push-action@v7
        with:
          context: app/
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load image into Docker daemon
        run: docker load -i /tmp/image.tar

      - name: Upload image artifact for scan job
        uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/image.tar

      # ── ECR push — main branch and manual triggers only ──────────────────
      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

     
      - name: Build and push to ECR
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        id: build-ecr
        uses: docker/build-push-action@v7
        with:
          context: app/
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha


      - name: Install Cosign
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign image by digest
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          DIGEST: ${{ steps.build-ecr.outputs.digest }}
        run: |
          if [[ -z "$DIGEST" ]]; then
            echo "❌ No digest from build step — cannot sign"
            exit 1
          fi

          IMAGE_REF="$REGISTRY/${{ env.ECR_REPOSITORY }}@$DIGEST"
          echo "Signing: $IMAGE_REF"

          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          chmod 600 cosign.key

          cosign sign --key cosign.key "$IMAGE_REF"

          rm -f cosign.key
          echo "✅ Image signed successfully"

  # ── 3. Container Scan ────────────────────────────────────────────────────
  container-scan:
    name: Container Scan — Trivy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      # Step A: Full SARIF report for GitHub Security tab
      - name: Trivy scan — SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          scanners: vuln
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Trivy scan — enforcement gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          scanners: vuln
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── 4. IaC Scan ──────────────────────────────────────────────────────────
  iac-scan:
    name: IaC Scan — Checkov
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-results.sarif

  # ── 5. Deploy — GitOps Manifest Update ───────────────────────────────────
  deploy:
    name: Sync GitOps Manifest
    runs-on: ubuntu-latest
    needs: [container-scan, iac-scan, build]
    # workflow_dispatch excluded intentionally — no head_commit on manual runs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Update image in deployment manifest
        env:
          ECR_URL: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}
          DIGEST: ${{ needs.build.outputs.digest }}
        run: |
          git pull --rebase origin main

          sed -i -E "s|^([[:space:]]*)image:.*web-app.*|\1image: $ECR_URL@$DIGEST|" \
            k8s/base/deployment.yaml

          grep "image:" k8s/base/deployment.yaml

          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add k8s/base/deployment.yaml

          # No changes means the image ref is already current — not an error
          git diff --cached --quiet && echo "No manifest changes, skipping commit." && exit 0

          git commit -m "chore(gitops): deploy sha-${{ github.sha }} [skip ci]"

          for i in 1 2 3; do
            if git push origin main; then
              exit 0
            fi
            echo "Push failed; rebasing and retrying ($i/3)..."
            git pull --rebase origin main
          done

          echo "❌ Failed to push after 3 attempts"
          exit 1
