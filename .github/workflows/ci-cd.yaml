name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: web-app
  ECR_REGISTRY: 393818036545.dkr.ecr.us-east-1.amazonaws.com

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  security-events: write

jobs:
  # ── 1. Security Gate ─────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan — Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Scan for secrets
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

  # ── 2. Build ─────────────────────────────────────────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    outputs:
      digest: ${{ steps.get-digest.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build locally for scanning — no push yet
      - name: Build image locally
        uses: docker/build-push-action@v7
        with:
          context: app/
          platforms: linux/amd64
          tags: web-app:${{ github.sha }}
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load image for scanning
        run: docker load -i /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/image.tar

      # Only push to ECR on main branch
      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: github.ref == 'refs/heads/main'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push to ECR — SHA tag only, no latest
        if: github.ref == 'refs/heads/main'
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: app/
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Capture digest reliably
      - name: Get image digest
        if: github.ref == 'refs/heads/main'
        id: get-digest
        run: |
          DIGEST=$(aws ecr describe-images \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageTag=sha-${{ github.sha }} \
            --region ${{ env.AWS_REGION }} \
            --query 'imageDetails[0].imageDigest' \
            --output text)

          if [[ -z "$DIGEST" || "$DIGEST" == "None" || "$DIGEST" == "null" ]]; then
            echo "❌ Failed to retrieve image digest from ECR"
            exit 1
          fi

          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "✅ Image digest: $DIGEST"

  # ── 3. Container Scan ────────────────────────────────────────────────────
  container-scan:
    name: Container Scan — Trivy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Trivy scan — SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: web-app:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Trivy scan — hard fail on unfixed criticals
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: web-app:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── 4. IaC Scan ──────────────────────────────────────────────────────────
  iac-scan:
    name: IaC Scan — Checkov
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true

  # ── 5. Sign image ────────────────────────────────────────────────────────
  sign:
    name: Sign Image — Cosign
    runs-on: ubuntu-latest
    needs: [container-scan, iac-scan, build]
    if: github.ref == 'refs/heads/main' && needs.build.outputs.digest != ''
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4

      - name: Sign image by digest
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          DIGEST: ${{ needs.build.outputs.digest }}
          IMAGE_REF: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
        run: |
          if [[ -z "$DIGEST" || "$DIGEST" == "null" || "$DIGEST" == "None" ]]; then
            echo "❌ DIGEST is empty or null. Cannot sign image."
            echo "DIGEST value received: '$DIGEST'"
            exit 1
          fi

          echo "Signing: $IMAGE_REF@$DIGEST"

          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          chmod 600 cosign.key

          cosign sign --key cosign.key "$IMAGE_REF@$DIGEST"

          rm -f cosign.key
          echo "✅ Image signed successfully with digest $DIGEST"

  # ── 6. Deploy ────────────────────────────────────────────────────────────
  deploy:
    name: Update GitOps Manifest
    runs-on: ubuntu-latest
    needs: [sign, build]
    if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Update image in deployment.yaml
        env:
          IMAGE_REF: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          DIGEST: ${{ needs.build.outputs.digest }}
        run: |
          git pull --rebase origin main

          # Update with digest — immutable reference
          sed -i "s|image:.*web-app.*|image: $IMAGE_REF@$DIGEST|g" \
            k8s/base/deployment.yaml

          cat k8s/base/deployment.yaml | grep "image:"

          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add k8s/base/deployment.yaml
          git commit -m "ci: deploy sha-${{ github.sha }} [skip ci]" || exit 0

          for i in 1 2 3; do
            if git push origin main; then exit 0; fi
            echo "Push failed, retrying ($i/3)..."
            git pull --rebase origin main
          done
          exit 1
