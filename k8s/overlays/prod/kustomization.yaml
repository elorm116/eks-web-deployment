apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: web
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 64Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 32Mi

  - target:
      kind: Service
      name: web
    patch: |-
      - op: replace
        path: /spec/type
        value: LoadBalancer
